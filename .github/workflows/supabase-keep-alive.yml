name: Supabase Keep-Alive

on:
  schedule:
    # Tourne toutes les 72 heures (à minuit tous les 3 jours)
    - cron: '0 0 */3 * *'
  workflow_dispatch:
    # Permet de le lancer manuellement depuis l'interface GitHub si besoin

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping de l'API Supabase pour maintenir le projet gratuit éveillé
        run: |
          curl -X GET "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
