services:
  gringotts:
    build:
      context: .
      args:
        - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL}
    container_name: gringotts
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"
    env_file:
      - .env
    depends_on:
      - pocketbase

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: pocketbase
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - ./pb_data:/pb_data
